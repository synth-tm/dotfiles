[window]
padding = { x = 8, y = 8 }
opacity = 0.85
blur = true

[font]
normal = { family = "AnonymicePro Nerd Font", style = "Regular" }
size = 16

[colors.primary]
background = '#181616'
foreground = '#c5c9c5'

[colors.normal]
black = '#0d0c0c'
red = '#c4746e'
green = '#8a9a7b'
yellow = '#c4b28a'
blue = '#8ba4b0'
magenta = '#a292a3'
cyan = '#8ea4a2'
white = '#c8c093'

[colors.bright]
black = '#a6a69c'
red = '#e46876'
green = '#87a987'
yellow = '#e6c384'
blue = '#7fb4ca'
magenta = '#938aa9'
cyan = '#7aa89f'
white = '#c5c9c5'

[colors.selection]
background = '#2d4f67'
foreground = '#c8c093'

[[colors.indexed_colors]]
index = 16
color = '#b6927b'

[[colors.indexed_colors]]
index = 17
color = '#b98d7b'

[cursor]
style = { shape = "block", blinking = "on" }
blink_interval = 500
blink_timeout = 0

[terminal]

[terminal.shell]
program = "/bin/bash"
args = ["--login"]

[mouse]
bindings = [
{ mouse = "Right", action = "Paste" },
]

